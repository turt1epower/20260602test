<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 반 랜덤 자리 배치</title>
<style>
body{margin:0;font-family:'Arial Rounded MT Bold', sans-serif;background:linear-gradient(135deg,#c8f2ff,#ffe9f6);min-height:100vh;text-align:center;color:#444;}
h1{margin-top:20px;font-size:2.2rem;}
button{background:#ff8ec7;border:none;color:white;padding:14px 24px;border-radius:999px;font-size:18px;cursor:pointer;margin:10px;box-shadow:0 4px 10px rgba(0,0,0,.15);}
button:hover{transform:scale(1.05);}
.classroom{display:flex;justify-content:center;gap:40px;margin:30px auto;flex-wrap:wrap;}
.group{background:white;border-radius:20px;padding:20px;box-shadow:0 6px 16px rgba(0,0,0,.12);}
.group-title{font-weight:bold;margin-bottom:12px;color:#ff6fae;}
.grid{display:grid;grid-template-columns:repeat(2,80px);grid-template-rows:repeat(4,60px);gap:10px;}
.seat{background:#fff8b8;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;border:2px solid #ffd85b;}
.footer{margin-top:10px;color:#666;}
</style>
</head>
<body>
<h1>🐰 우리 반 랜덤 자리 배치 🐻</h1>
<button onclick="shuffleSeats()">🎲 자리 섞기</button>
<div class="classroom" id="classroom"></div>
<div class="footer">24명 / 2×4 분단 3개</div>
<script>
const students=[];
for(let i=1;i<=25;i++){ if(i!==21) students.push(i); }
function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}
function render(){
    const room=document.getElementById('classroom');
    room.innerHTML='';
    const shuffled=[...students];
    shuffle(shuffled);
    for(let g=0; g<3; g++){
        const group=document.createElement('div');
        group.className='group';
        const title=document.createElement('div');
        title.className='group-title';
        title.textContent=`🌟 ${g+1}분단`;
        const grid=document.createElement('div');
        grid.className='grid';
        for(let s=0;s<8;s++){
            const seat=document.createElement('div');
            seat.className='seat';
            seat.textContent=shuffled[g*8+s] + '번';
            grid.appendChild(seat);
        }
        group.appendChild(title);
        group.appendChild(grid);
        room.appendChild(group);
    }
}
function shuffleSeats(){ render(); }
render();
</script>
</body>
</html>
